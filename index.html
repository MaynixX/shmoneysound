<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pro Harmonic Detector + Segment Player</title>
    <style>
        :root { --bg: #0f0f12; --panel: #1a1a20; --accent: #b33939; --accent-glow: #ff5252; --success: #218c53; --success-glow: #2ecc71; --text: #eee; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 1000px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: #fff; margin: 0 0 5px 0; font-size: 26px; }
        .header p { color: #888; font-size: 13px; margin: 0;}

        .project-selector { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .project-selector select { padding: 10px; border-radius: 8px; background: #000; color: #fff; border: 1px solid #444; outline: none; cursor: pointer; font-size: 14px; min-width: 200px;}

        .controls { display: flex; gap: 20px; background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; align-items: center; justify-content: space-between; flex-wrap: wrap;}
        .group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 220px;}
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent-glow); }
        .val-display { font-size: 16px; font-weight: bold; color: #fff; font-family: monospace;}

        #startBtn { padding: 15px 30px; font-weight: 900; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; background: var(--success); color: #fff; transition: 0.3s; box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); height: fit-content; text-transform: uppercase;}
        #startBtn.active { background: var(--accent); box-shadow: 0 0 15px rgba(255, 82, 82, 0.3); }

        .canvas-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); }
        canvas { display: block; width: 100%; height: 500px; }

        .live-stats { display: flex; justify-content: space-around; background: #000; border-top: 1px solid #333; padding: 10px; font-family: monospace; color: #aaa; font-size: 14px;}
        .stat-val { color: var(--success-glow); font-weight: bold; font-size: 16px; }

        .display { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .status-box { flex: 1; min-width: 200px; background: var(--panel); padding: 20px; border-radius: 12px; border-left: 6px solid #444; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s;}
        .log-box { flex: 1.5; min-width: 300px; background: var(--panel); padding: 15px; border-radius: 12px; font-family: 'Consolas', monospace; font-size: 13px; color: #888; height: 130px; overflow-y: auto; border: 1px solid #333;}
        
        #status { font-size: 2.2rem; font-weight: 900; color: #666; text-align: center; text-transform: uppercase; line-height: 1;}
        #substatus { font-size: 0.9rem; color: #888; margin-top: 8px; font-family: monospace;}

        .playlist-wrapper { width: 100%; background: var(--panel); border: 1px solid #333; border-radius: 12px; margin-top: 20px; padding: 15px; box-sizing: border-box;}
        .playlist-wrapper h3 { margin: 0 0 10px 0; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}
        #trackList { list-style: none; padding: 0; margin: 0; display: flex; gap: 10px; flex-wrap: wrap;}
        #trackList li { background: #000; padding: 8px 15px; border-radius: 6px; border: 1px solid #333; font-size: 13px; color: #666; transition: 0.2s;}
        #trackList li.active { background: rgba(46, 204, 113, 0.15); border-color: var(--success); color: #fff; font-weight: bold; box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Строгий Детектор + Плеер (Single-File)</h2>
        <p>Клик — след. часть | Удержание (>2.5с) — назад на 15 сек</p>
    </div>

    <div class="project-selector">
        <label for="projectSelect">Проект:</label>
        <select id="projectSelect">
            <option value="">-- Выберите папку --</option>
            <option value="math">Math</option>
            <option value="him">Him</option>
        </select>
    </div>

    <div class="controls">
        <button id="startBtn">Включить микрофон</button>
        <div class="group">
            <label>Базовый порог: <span id="thrVal" class="val-display">80</span></label>
            <input type="range" id="threshSlider" min="10" max="200" value="80">
        </div>
        <div class="group">
            <label>Превышение шума: <span id="promVal" class="val-display">25</span>%</label>
            <input type="range" id="promSlider" min="5" max="100" value="25" step="5">
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="viz"></canvas>
        <div class="live-stats">
            <div>Совпадений: <span class="stat-val" id="matchCount">0 / 9</span></div>
            <div>Время части: <span class="stat-val" id="segmentClock">00:00</span></div>
            <div>Статус: <span class="stat-val" id="patternStatus" style="color: #666;">IDLE</span></div>
        </div>
    </div>

    <div class="display">
        <div class="status-box" id="statusBox">
            <div id="status">ТИШИНА</div>
            <div id="substatus">ОЖИДАНИЕ...</div>
        </div>
        <div class="log-box" id="log"></div>
    </div>

    <div class="playlist-wrapper">
        <h3>Разметка файла (info.txt):</h3>
        <ul id="trackList">
            <li style="border: none; background: transparent;">Проект не выбран</li>
        </ul>
    </div>
</div>

<script>
    const audioPlayer = new Audio();
    let segments = [];
    let currentSegmentIndex = -1;
    let isRunning = false;

    // --- ПАРСИНГ ВРЕМЕНИ (02:35 -> 155) ---
    function parseTimeToSeconds(timeStr) {
        const parts = timeStr.trim().split(':').map(Number);
        return parts.length === 2 ? parts[0] * 60 + parts[1] : parts[0] * 3600 + parts[1] * 60 + parts[2];
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    // --- ЗАГРУЗКА И РАЗМЕТКА ---
    async function loadProject(name) {
        if (!name) return;
        try {
            const response = await fetch(`projects/${name}/info.txt`);
            const text = await response.text();
            
            const lines = text.split('\n').filter(l => l.includes(' - '));
            segments = lines.map((line) => {
                const [title, time] = line.split(' - ');
                return { title: title.trim(), start: parseTimeToSeconds(time) };
            });

            // Конец текущего сегмента = начало следующего
            for (let i = 0; i < segments.length; i++) {
                segments[i].end = segments[i+1] ? segments[i+1].start : 99999;
            }

            const trackListEl = document.getElementById('trackList');
            trackListEl.innerHTML = segments.map((s, i) => `<li id="seg-${i}">${s.title}</li>`).join('');
            
            audioPlayer.src = `/projects/${name}/record.mp3`;
            audioPlayer.load();
            
            addLog(`Проект [${name}] загружен: ${segments.length} частей.`);
            currentSegmentIndex = 0;
        } catch (e) {
            addLog("Ошибка загрузки: " + e.message);
        }
    }

    // --- НАВИГАЦИЯ ---
    function nextSegment() {
        if (!segments.length) return;
        currentSegmentIndex = (currentSegmentIndex + 1) % segments.length;
        audioPlayer.currentTime = segments[currentSegmentIndex].start;
        audioPlayer.play().catch(()=>{});
        addLog(`>>> ${segments[currentSegmentIndex].title}`);
    }

    function rewindAudio() {
        audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 15);
        addLog(`<<< Перемотка -15с`);
    }

    // --- АНАЛИЗАТОР И ДЕТЕКТОР ---
    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('startBtn');
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const substatusEl = document.getElementById('substatus');
    const statusBox = document.getElementById('statusBox');

    const BASE_FREQ = 694.4;
    const HARMONICS = [BASE_FREQ, BASE_FREQ*2, BASE_FREQ*3, BASE_FREQ*4, BASE_FREQ*5, BASE_FREQ*6, BASE_FREQ*7, BASE_FREQ*8, BASE_FREQ*9];
    const TOL_INNER = 40, TOL_OUTER = 100, MIN_MATCHES = 3;

    let audioCtx, analyser, dataArray;
    let sigActive = false, sigStart = 0, lastSeen = 0, graceTimer = null;

    btn.onclick = async () => {
        if (isRunning) return;
        try {
            // Разблокировка звука для Apple
            audioPlayer.play().then(() => audioPlayer.pause());

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 8192;
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            isRunning = true;
            btn.textContent = "СИСТЕМА АКТИВНА";
            btn.classList.add('active');
            addLog("Микрофон подключен. Детектор запущен.");
            render();
        } catch (e) { alert("Доступ к микрофону отклонен."); }
    };

    function handleSignal(dur) {
        if (dur > 2500) {
            statusEl.textContent = "УДЕРЖАНИЕ";
            statusEl.style.color = 'var(--accent-glow)';
            statusBox.style.borderLeftColor = 'var(--accent-glow)';
            rewindAudio();
        } else {
            statusEl.textContent = "КЛИК";
            statusEl.style.color = 'var(--success-glow)';
            statusBox.style.borderLeftColor = 'var(--success-glow)';
            nextSegment();
        }
        setTimeout(() => {
            statusEl.textContent = "ТИШИНА";
            statusEl.style.color = '#666';
            statusBox.style.borderLeftColor = '#444';
        }, 2000);
    }

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML = `[${time}] ${msg}<br>` + logEl.innerHTML;
    }

    function render() {
        requestAnimationFrame(render);
        if (!isRunning) return;

        const now = Date.now();
        analyser.getByteFrequencyData(dataArray);
        
        // Обновление UI плеера
        const ct = audioPlayer.currentTime;
        const segIdx = segments.findIndex(s => ct >= s.start && ct < s.end);
        if (segIdx !== -1) {
            if (segIdx !== currentSegmentIndex) {
                currentSegmentIndex = segIdx;
                document.querySelectorAll('#trackList li').forEach(li => li.classList.remove('active'));
                document.getElementById(`seg-${segIdx}`).classList.add('active');
            }
            substatusEl.textContent = segments[segIdx].title.toUpperCase();
            document.getElementById('segmentClock').textContent = formatTime(ct - segments[segIdx].start);
        }

        // Отрисовка Канваса
        const W = canvas.width = canvas.clientWidth;
        const H = canvas.height = canvas.clientHeight;
        const threshold = parseInt(document.getElementById('threshSlider').value);
        const promRatio = 1 + (parseInt(document.getElementById('promSlider').value) / 100);
        
        ctx.clearRect(0, 0, W, H);
        const freqToX = (f) => (f / 8000) * W;
        const valToY = (v) => H - (v / 255) * H;

        // Сетка гармоник
        HARMONICS.forEach(f => {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fillRect(freqToX(f - TOL_INNER), 0, freqToX(f + TOL_INNER) - freqToX(f - TOL_INNER), H);
        });

        // Спектрограмма
        ctx.beginPath();
        ctx.strokeStyle = '#00e5ff';
        const hzPerBin = audioCtx.sampleRate / (dataArray.length * 2);
        let activeHits = 0;

        for (let i = 0; i < dataArray.length; i++) {
            const f = i * hzPerBin;
            if (f > 8000) break;
            const x = freqToX(f);
            const y = valToY(dataArray[i]);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);

            // Детекция пиков в зонах гармоник
            HARMONICS.forEach(h => {
                if (f > h - 10 && f < h + 10 && dataArray[i] > threshold) {
                    activeHits++;
                }
            });
        }
        ctx.stroke();

        document.getElementById('matchCount').textContent = `${activeHits} / 9`;

        // Логика сигналов (клик/удержание)
        if (activeHits >= MIN_MATCHES) {
            if (!sigActive) { sigActive = true; sigStart = now; }
            lastSeen = now;
        } else {
            if (sigActive && (now - lastSeen > 100)) {
                handleSignal(lastSeen - sigStart);
                sigActive = false;
            }
        }
    }

    document.getElementById('projectSelect').onchange = (e) => loadProject(e.target.value);
    document.getElementById('threshSlider').oninput = (e) => document.getElementById('thrVal').textContent = e.target.value;
    document.getElementById('promSlider').oninput = (e) => document.getElementById('promVal').textContent = e.target.value;
</script>
</body>
</html>
